<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        body {
            font-family: 'Courier New', Courier, monospace;
        }
        img {
            border-radius: 3cap;
            max-width: 800px ;
        }
        h1{
            font-weight: 500;
            margin: 20px;
        }
        article{
            background-color: rgb(109, 140, 157);
            border-radius: 12cap;
            margin: 20px;
            padding: 5cap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }
        span{
            margin: 10;
        }

        .genre {
         background-color: lightblue;
         padding: 5px 10px;
         border-radius: 10px;
         border: 1px solid steelblue;
         display: inline-block;
         margin-right: 5px;
} 
    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
          xhr.onload = function () {
            const bodyElement = document.querySelector("body")

            if (xhr.status == 200) {
            const movies = JSON.parse(xhr.responseText)

             movies.forEach(function(movie) {

            const article = document.createElement("article")

            const title = document.createElement("h1")
            title.textContent = movie.Title

            const released = document.createElement("p")
            released.textContent = "Released: " + movie.Released

            const runtime = document.createElement("p")
            runtime.textContent = "Runtime: " + movie.Runtime + " min"

            const directors = document.createElement("p")
            directors.textContent = "Directors: " + movie.Directors

            const writers = document.createElement("p")
            writers.textContent = "Writers: " + movie.Writers

            const actors = document.createElement("p")
            actors.textContent = "Actors: " + movie.Actors

            const metascore = document.createElement("p")
            metascore.textContent = "Metascore: " + movie.Metascore

            const imdbRating = document.createElement("p")
            imdbRating.textContent = "imdbRating: " + movie.imdbRating

            const poster = document.createElement("img")
            poster.src = movie.Poster
            poster.alt = movie.Title

            const plot = document.createElement("p")
            plot.textContent = movie.Plot

           const genresParagraph = document.createElement("p")
            genresParagraph.textContent = "Genres: "

            movie.Genres.forEach(function (genre) {
            const span = document.createElement("span")
             span.textContent = genre
             span.className = "genre"
             genresParagraph.append(span)
})

            article.append(title)
            article.append(released)
            article.append(runtime)
            article.append(poster)
            article.append(genresParagraph)
            article.append(directors)
            article.append(writers)
            article.append(actors)
            article.append(plot)
            article.append(metascore)
            article.append(imdbRating)
            
            
            
            

            bodyElement.append(article)
        })

    } 
      else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
}
               
            
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
