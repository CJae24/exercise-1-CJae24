<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>

    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 20px;
            background-color: #f5f5f5;
        }

        article {
            background-color: rgb(109, 140, 157);
            border-radius: 30px;
            margin: 20px 0;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

        img {
            border-radius: 20px;
            max-width: 100%;
        }

        h1 {
            font-weight: lighter;
            margin: 20px 0;
        }

        h2 {
            margin-bottom: 10px;
        }

        figure {
            margin: 20px 0;
        }


        .genre {
            background-color: lightblue;
            padding: 5px 10px;
            border-radius: 10px;
            border: 1px solid steelblue;
            display: inline-block;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>

    <script>
        window.onload = function () {
            const xhr = new XMLHttpRequest()

            xhr.onload = function () {
                const bodyElement = document.querySelector("body")

                if (xhr.status == 200) {
                    const movies = JSON.parse(xhr.responseText)

                    movies.forEach(movie => {
                        const movieElement = document.createElement("article")

                        movieElement.innerHTML = `
                        <header>
                            <h1>${movie.Title}</h1>
                        </header>

                        <figure>
                            <img src="${movie.Poster}" alt="Poster of ${movie.Title}">
                        </figure>

                        <section>
                            <p><strong>Release Date:</strong> ${new Date(movie.Released).toLocaleDateString()} 
                            rs<strong>Runtime:</strong> ${movie.Runtime} min</p>
                            <p><strong>Metascore:</strong> ${movie.Metascore}</p>
                            <p><strong>IMDb Rating:</strong> ${movie.imdbRating}</p>
                        </section>

                        <section>
                            <h3>Genres</h3>
                            <p>${movie.Genres.map(g => `<span class="genre">${g}</span>`).join("")}</p>
                        </section>

                        <section>
                            <h3>Plot</h3>
                            <p>${movie.Plot}</p>
                        </section>

                        <section>
                            <h3>Directors</h3>
                            <ul>${movie.Directors.map(d => `<li>${d}</li>`).join("")}</ul>
                        </section>

                        <section>
                            <h3>Writers</h3>
                            <ul>${movie.Writers.map(w => `<li>${w}</li>`).join("")}</ul>
                        </section>

                        <section>
                            <h3>Actors</h3>
                            <ul>${movie.Actors.map(a => `<li>${a}</li>`).join("")}</ul>
                        </section>
                        `

                        bodyElement.appendChild(movieElement)
                    })

                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }

            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
